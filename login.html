<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI · 登录</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">AI</div>
      <div class="brand-sub">我们的时光</div>

      <div id="errorBox" class="error-msg hidden"></div>

      <!-- 登录表单 -->
      <form id="loginForm">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="loginEmail" placeholder="输入你的邮箱" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="输入密码" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">登 录</button>
      </form>

      <!-- 注册表单（默认隐藏） -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>你是谁</label>
          <select id="regRole" required>
            <option value="">请选择</option>
            <option value="male">任砚铭</option>
            <option value="female">田敏</option>
          </select>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="regEmail" placeholder="设置登录邮箱" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="设置密码（至少6位）" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
      </form>

      <div class="auth-switch">
        <span id="switchText">还没有账号？</span>
        <a href="#" id="switchLink">注册</a>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const switchLink = document.getElementById('switchLink');
    const switchText = document.getElementById('switchText');
    const errorBox = document.getElementById('errorBox');
    let isLoginMode = true;

    // 启动时检查配置是否加载成功
    (function checkConfig() {
      if (typeof CONFIG === 'undefined') {
        showError('配置加载失败：js/config.js 未正确加载');
        return;
      }
      if (!CONFIG.SUPABASE_URL || CONFIG.SUPABASE_URL.includes('你的项目ID')) {
        showError('配置错误：SUPABASE_URL 未替换为实际值');
        return;
      }
      if (!CONFIG.SUPABASE_KEY || CONFIG.SUPABASE_KEY.includes('你的anon')) {
        showError('配置错误：SUPABASE_KEY 未替换为实际值');
        return;
      }
      initSupabase();
    })();

    // 如果已登录，直接跳转到首页
    (async () => {
      if (typeof getSupabase !== 'function') return;
      try {
        const { data: { session } } = await getSupabase().auth.getSession();
        if (session) {
          const { data: profile } = await getSupabase()
            .from('profiles')
            .select('*')
            .eq('id', session.user.id)
            .single();
          if (profile) {
            setCurrentUser({ ...session.user, ...profile });
            window.location.href = 'index.html';
          }
        }
      } catch (e) {
        // 忽略：未登录状态
      }
    })();

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    function hideError() {
      errorBox.classList.add('hidden');
    }

    // 切换登录/注册
    switchLink.addEventListener('click', (e) => {
      e.preventDefault();
      hideError();
      isLoginMode = !isLoginMode;
      if (isLoginMode) {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        switchText.textContent = '还没有账号？';
        switchLink.textContent = '注册';
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        switchText.textContent = '已有账号？';
        switchLink.textContent = '登录';
      }
    });

    // 登录
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      const btn = loginForm.querySelector('button');
      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        const { data, error } = await getSupabase().auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (!data || !data.user) throw new Error('登录返回数据为空');

        const { data: profile } = await getSupabase()
          .from('profiles')
          .select('*')
          .eq('id', data.user.id)
          .single();

        setCurrentUser({ ...data.user, ...profile });
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || '登录失败');
      } finally {
        btn.textContent = '登 录';
        btn.disabled = false;
      }
    });

    // 注册
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const role = document.getElementById('regRole').value;
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      if (!role) { showError('请选择你的身份'); return; }
      if (password.length < 6) { showError('密码至少需要6位'); return; }

      const btn = registerForm.querySelector('button');
      btn.textContent = '注册中...';
      btn.disabled = true;

      try {
        const name = role === 'male' ? CONFIG.MALE_NAME : CONFIG.FEMALE_NAME;
        const result = await getSupabase().auth.signUp({
          email,
          password,
          options: {
            data: { name, role }
          }
        });

        const { data, error } = result;

        // 显示详细错误信息
        if (error) {
          showError('Supabase 错误：' + error.message + ' (状态码: ' + (error.status || '未知') + ')');
          return;
        }

        if (!data) {
          showError('注册失败：Supabase 返回空数据。可能原因：1) 邮箱验证未关闭 2) 项目配置问题');
          return;
        }

        if (data.user && data.session) {
          // 有 user 和 session = 注册成功且已登录
          setCurrentUser({ ...data.user, name, role });
          showToast('注册成功！');
          setTimeout(() => { window.location.href = 'index.html'; }, 500);
        } else if (data.user && !data.session) {
          // 有 user 无 session = 需要邮箱验证
          showError('注册请求已提交，但需要验证邮箱。请在 Supabase 控制台 → Authentication → Settings 中关闭 "Confirm email"');
        } else {
          showError('注册失败，返回数据异常：' + JSON.stringify(data));
        }
      } catch (err) {
        showError('请求异常：' + (err.message || '未知错误'));
      } finally {
        btn.textContent = '注 册';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
