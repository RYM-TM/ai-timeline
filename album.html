<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI · 相册</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        AI<span class="dot"></span><span style="font-weight:400;font-size:15px;color:var(--ink-light);">我们的时光</span>
      </a>
      <div class="navbar-nav">
        <a href="index.html">时间线</a>
        <a href="album.html" class="active">相册</a>
        <a href="messages.html">留言板</a>
        <a href="wishes.html">愿望清单</a>
        <a href="anniversaries.html">纪念日</a>
      </div>
      <div class="navbar-actions">
        <div class="navbar-user" id="userInfo">
          <div class="avatar avatar-ren" id="userAvatar">砚</div>
          <span class="name" id="userName">任砚铭</span>
        </div>
        <button class="btn btn-outline btn-sm" id="logoutBtn">退出</button>
      </div>
    </div>
  </nav>

  <div class="full-page">
    <div class="page-header">
      <h2>我们的相册</h2>
      <p>所有上传过的照片，按时间排列</p>
    </div>

    <div id="albumContent">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    let currentUser = null;

    (async function init() {
      if (!requireAuth()) return;
      currentUser = getCurrentUser();
      initSupabase();
      updateUserUI();
      await loadPhotos();
      setupEvents();
    })();

    function updateUserUI() {
      document.getElementById('userAvatar').textContent = getUserAvatar(currentUser);
      document.getElementById('userAvatar').className = 'avatar ' + getUserAvatarClass(currentUser);
      document.getElementById('userName').textContent = getUserName(currentUser);
    }

    async function loadPhotos() {
      const container = document.getElementById('albumContent');
      try {
        const { data, error } = await getSupabase()
          .from('posts')
          .select('id, images, content, created_at')
          .order('created_at', { ascending: false })
          .limit(200);

        if (error) throw error;

        const allPhotos = [];
        if (data) {
          data.forEach(post => {
            if (post.images && Array.isArray(post.images)) {
              post.images.forEach(img => {
                allPhotos.push({
                  url: img,
                  postId: post.id,
                  content: post.content ? post.content.substring(0, 60) : '',
                  date: post.created_at
                });
              });
            }
          });
        }

        if (allPhotos.length === 0) {
          container.innerHTML = `
            <div class="card card-empty" style="max-width:700px;margin:0 auto;">
              <p>还没有照片</p>
              <p>在时间线中发布记录时上传照片，它们会自动出现在这里。</p>
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="album-grid" style="max-width:900px;margin:0 auto;">
            ${allPhotos.map(photo => `
              <div class="album-item">
                <img src="${escapeHTML(photo.url)}" alt="照片" loading="lazy">
                <div class="album-overlay">
                  <span class="album-caption">${formatDate(photo.date)}</span>
                </div>
              </div>
            `).join('')}
          </div>`;
      } catch (err) {
        container.innerHTML = `<div class="error-msg">加载失败：${err.message}</div>`;
      }
    }

    function setupEvents() {
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await getSupabase().auth.signOut();
        clearCurrentUser();
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
